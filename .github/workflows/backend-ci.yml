name: Backend CI

on:
  push:
    paths:
      - "ap2-back/**"
  pull_request:
    paths:
      - "ap2-back/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: metaquest_test
          POSTGRES_USER: metaquest
          POSTGRES_PASSWORD: metaquest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ap2-back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ap2-back/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://metaquest:metaquest@localhost:5432/metaquest_test
        run: pytest tests/ -v
